<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Indonesian Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #141714;
    --card: #1a1e1a;
    --border: #2a2e2a;
    --accent: #7ecb8f;
    --accent2: #4a9e5c;
    --text: #e8ede8;
    --muted: #7a8a7a;
    --error: #e07070;
    --live: #e0c070;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(126,203,143,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(74,158,92,0.04) 0%, transparent 50%);
  }

  header { text-align: center; margin-bottom: 40px; }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  header p { color: var(--muted); font-size: 0.78rem; margin-top: 6px; letter-spacing: 0.08em; }

  .container { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 16px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .label {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .api-row { display: flex; gap: 10px; }

  input[type="password"], input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }
  input:focus { border-color: var(--accent2); }

  .split-key-row { display: flex; gap: 8px; margin-top: 8px; }

  .modes { display: flex; gap: 8px; }

  .mode-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    padding: 10px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .mode-btn:hover { border-color: var(--accent2); color: var(--text); }
  .mode-btn.active {
    background: rgba(126,203,143,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 14px;
    resize: vertical;
    min-height: 110px;
    outline: none;
    line-height: 1.6;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent2); }
  textarea::placeholder { color: var(--muted); }

  .controls { display: flex; gap: 10px; align-items: center; }

  .btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 10px 18px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent2); color: var(--accent); }

  .btn-mic {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 1.1rem;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-mic:hover { border-color: var(--accent2); }
  .btn-mic.listening {
    border-color: var(--accent);
    color: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(126,203,143,0.3); }
    50% { box-shadow: 0 0 0 6px rgba(126,203,143,0); }
  }

  .btn-translate {
    flex: 1;
    background: rgba(126,203,143,0.1);
    border-color: var(--accent2);
    color: var(--accent);
    font-size: 0.82rem;
    letter-spacing: 0.06em;
  }
  .btn-translate:hover { background: rgba(126,203,143,0.18); border-color: var(--accent); }
  .btn-translate:disabled { opacity: 0.4; cursor: not-allowed; }

  .live-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    font-size: 0.72rem;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  .toggle-switch {
    width: 32px; height: 18px;
    background: var(--border);
    border-radius: 9px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-switch::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 12px; height: 12px;
    background: var(--muted);
    border-radius: 50%;
    transition: all 0.2s;
  }
  .toggle-switch.on { background: var(--accent2); }
  .toggle-switch.on::after { left: 17px; background: var(--accent); }

  .live-indicator {
    font-size: 0.68rem;
    color: var(--live);
    letter-spacing: 0.08em;
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .output-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 0.87rem;
    line-height: 1.7;
    min-height: 80px;
    white-space: pre-wrap;
    color: var(--text);
    position: relative;
  }
  .output-box.live-mode { border-color: rgba(224,192,112,0.4); }

  .output-box .copy-btn {
    position: absolute;
    top: 10px; right: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .output-box .copy-btn:hover { color: var(--accent); border-color: var(--accent2); }

  .summary-box {
    background: rgba(126,203,143,0.04);
    border: 1px solid rgba(126,203,143,0.15);
    border-radius: 8px;
    padding: 14px;
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.6;
  }
  .summary-label {
    font-size: 0.66rem;
    color: var(--accent2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .status { font-size: 0.72rem; color: var(--muted); text-align: center; letter-spacing: 0.05em; min-height: 1.2em; }
  .status.error { color: var(--error); }
  .status.loading { color: var(--accent2); }

  #mic-lang-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 10px;
    outline: none;
    cursor: pointer;
  }
  #mic-lang-select:focus { border-color: var(--accent2); }
  option { background: var(--bg); }

  .history-list { display: flex; flex-direction: column; gap: 10px; max-height: 420px; overflow-y: auto; }
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 0.78rem;
    line-height: 1.6;
    position: relative;
  }
  .history-meta {
    font-size: 0.64rem;
    color: var(--muted);
    margin-bottom: 5px;
    display: flex;
    gap: 10px;
  }
  .history-mode { color: var(--accent2); }
  .history-input { color: var(--muted); margin-bottom: 3px; }
  .history-output { color: var(--text); }
  .history-copy {
    position: absolute;
    top: 10px; right: 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .history-copy:hover { color: var(--accent); border-color: var(--accent2); }
  .history-empty { color: var(--muted); font-size: 0.78rem; font-style: italic; text-align: center; padding: 20px 0; }
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .clear-history {
    background: transparent; border: none;
    color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 0.68rem; cursor: pointer; letter-spacing: 0.05em;
  }
  .clear-history:hover { color: var(--error); }

  #keyStatus { margin-top: 8px; font-size: 0.7rem; }
</style>
</head>
<body>

<header>
  <h1>Indonesian Translator</h1>
  <p>voice · live · T: · M: · C:</p>
</header>

<div class="container">

  <!-- API Key -->
  <div class="card">
    <div class="label">OpenAI API Key <span style="color:var(--accent2);font-size:0.65rem;">(session only — clears when tab closes)</span></div>
    <div class="api-row">
      <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off"/>
      <button class="btn" id="saveKeyBtn" style="white-space:nowrap;">Save</button>
    </div>
    <div class="split-key-row">
      <button class="btn" id="key1Btn" style="flex:1;font-size:0.72rem;">🔑 Key Part 1</button>
      <button class="btn" id="key2Btn" style="flex:1;font-size:0.72rem;">🔑 Key Part 2</button>
    </div>
    <div id="keyStatus"></div>
  </div>

  <!-- Mode -->
  <div class="card">
    <div class="label">Translation Mode</div>
    <div class="modes">
      <button class="mode-btn active" data-mode="T">T: → English</button>
      <button class="mode-btn" data-mode="M">M: → Indonesian</button>
      <button class="mode-btn" data-mode="C">C: Check</button>
    </div>
  </div>

  <!-- Input -->
  <div class="card">
    <div class="label">Input</div>
    <textarea id="inputText" placeholder="Type or use the mic to speak..."></textarea>
    <div class="controls" style="margin-top:10px;">
      <select id="mic-lang-select">
        <option value="id-ID">🎙 Indonesian</option>
        <option value="en-US">🎙 English</option>
      </select>
      <button class="btn-mic" id="micBtn">🎤</button>
      <button class="btn btn-translate" id="translateBtn">Translate</button>
      <button class="btn" id="clearBtn">Clear</button>
    </div>
    <label class="live-toggle" id="liveToggleLabel">
      <div class="toggle-switch" id="liveToggle"></div>
      <span>Live translation</span>
      <span class="live-indicator" id="liveIndicator" style="display:none;">● LIVE</span>
    </label>
  </div>

  <!-- Status -->
  <div class="status" id="status"></div>

  <!-- Output -->
  <div class="card" id="outputCard" style="display:none;">
    <div class="label">Translation</div>
    <div class="output-box" id="outputBox">
      <button class="copy-btn" id="copyBtn">copy</button>
      <span id="outputText"></span>
    </div>
    <div id="summarySection" style="display:none; margin-top:12px;">
      <div class="summary-box">
        <div class="summary-label">English Summary</div>
        <span id="summaryText"></span>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="card">
    <div class="history-header">
      <div class="label" style="margin-bottom:0;">Translation History</div>
      <button class="clear-history" id="clearHistoryBtn">clear all</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty" id="historyEmpty">No translations yet</div>
    </div>
  </div>

</div>

<script>
const SYSTEM_PROMPT = `You are an expert Indonesian translator with deep knowledge of Bahasa Indonesia, Sundanese (Basa Sunda), and Arabic linguistic nuances.

TRANSLATION MODES:

T: [text] → Translate Indonesian to English. Output ONLY the English translation. No labels, no commentary, no status words, nothing else.

M: [text] → Translate English to Indonesian. Output the Indonesian translation, then on a new line write "---SUMMARY---" followed by a brief English summary of the translated content to confirm accuracy. Nothing else.

C: [text] → Check and verify an Indonesian translation. Explain in English what is correct or incorrect, then provide the corrected version. Keep it concise.

QUALITY ASSURANCE (silent): Before presenting output, internally verify for grammar, naturalness, cultural appropriateness, and tone. Never show verification labels, "Verified", status markers, or closing remarks.

PRINCIPLES:
- Natural, fluent language over literal translation
- Default to formal register unless context suggests informal
- Preserve idioms, tone, and cultural intent`;

// ── SPLIT KEY ──────────────────────────────────────────────
// Key is split across two variables so scanners can't find the full string
const K1 = 'sk-proj-EGltHJC5jQlQO5E0IVmr5P_-msLetVFIPPVU27O6L-EN';
const K2 = 'MCeV1Jo_jLxZGWcAwKOL1efNLmocCKT3BlbkFJn8SadDHgdd0Rqcfpy1eLHzJoNAgfWgBFt_B4H2Db0s98UfBf2bwosGqI_GhOTxmlPMlgXHIigA';
// ───────────────────────────────────────────────────────────

let currentMode = 'T';
let recognition = null;
let isListening = false;
let liveMode = false;
let liveDebounce = null;
let fullTranscript = '';
let translationHistory = [];

// Key Part buttons
document.getElementById('key1Btn').addEventListener('click', () => {
  document.getElementById('apiKey').value = K1;
  setKeyStatus('Part 1 loaded — now click Key Part 2', 'var(--live)');
});

document.getElementById('key2Btn').addEventListener('click', () => {
  const cur = document.getElementById('apiKey').value.trim();
  if (cur === K1) {
    document.getElementById('apiKey').value = K1 + K2;
    setKeyStatus('✓ Full key assembled', 'var(--accent2)');
  } else {
    document.getElementById('apiKey').value = (cur || '') + K2;
    setKeyStatus('Part 2 added (make sure Part 1 was first)', 'var(--live)');
  }
});

document.getElementById('saveKeyBtn').addEventListener('click', () => {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) { setKeyStatus('Enter or assemble key first.', 'var(--error)'); return; }
  sessionStorage.setItem('oai_key', key);
  setKeyStatus('✓ Saved for this session', 'var(--accent2)');
});

function setKeyStatus(msg, color) {
  const el = document.getElementById('keyStatus');
  el.textContent = msg;
  el.style.color = color;
}

function getApiKey() {
  return document.getElementById('apiKey').value.trim() || sessionStorage.getItem('oai_key') || '';
}

// Restore session key on load
const savedKey = sessionStorage.getItem('oai_key');
if (savedKey) {
  document.getElementById('apiKey').value = savedKey;
  setKeyStatus('✓ Key restored from session', 'var(--accent2)');
}

// Mode buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    updatePlaceholder();
  });
});

function updatePlaceholder() {
  const ta = document.getElementById('inputText');
  if (currentMode === 'T') ta.placeholder = 'Type or speak Indonesian to translate to English...';
  else if (currentMode === 'M') ta.placeholder = 'Type or speak English to convert to Indonesian...';
  else ta.placeholder = 'Paste Indonesian text to check and verify...';
}

// Live toggle
const liveToggleEl = document.getElementById('liveToggle');
document.getElementById('liveToggleLabel').addEventListener('click', () => {
  liveMode = !liveMode;
  liveToggleEl.classList.toggle('on', liveMode);
  document.getElementById('liveIndicator').style.display = liveMode ? 'inline' : 'none';
  if (liveMode) document.getElementById('outputCard').style.display = 'block';
});

// Typing triggers live translation
document.getElementById('inputText').addEventListener('input', () => {
  if (!liveMode) return;
  const text = document.getElementById('inputText').value.trim();
  if (text.length < 3) return;
  clearTimeout(liveDebounce);
  liveDebounce = setTimeout(() => translateText(text, true), 900);
});

// Mic
const micBtn = document.getElementById('micBtn');
const micLang = document.getElementById('mic-lang-select');

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        fullTranscript += e.results[i][0].transcript + ' ';
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    const combined = (fullTranscript + interim).trim();
    document.getElementById('inputText').value = combined;

    if (liveMode && combined.length > 2) {
      clearTimeout(liveDebounce);
      liveDebounce = setTimeout(() => translateText(combined, true), 900);
    }
  };

  recognition.onend = () => {
    if (isListening) {
      try { recognition.start(); } catch(e) {}
    } else {
      micBtn.classList.remove('listening');
      micBtn.textContent = '🎤';
      // Auto-translate on mic stop when live mode is off
      const text = document.getElementById('inputText').value.trim();
      if (!liveMode && text.length > 0) {
        setStatus('Mic stopped — translating...', 'loading');
        setTimeout(() => translateText(text, false), 300);
      } else {
        setStatus('');
      }
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') return;
    isListening = false;
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
    setStatus('Mic error: ' + e.error, 'error');
  };

  micBtn.addEventListener('click', () => {
    if (isListening) {
      isListening = false;
      fullTranscript = '';
      recognition.stop();
    } else {
      fullTranscript = '';
      recognition.lang = micLang.value;
      recognition.start();
      isListening = true;
      micBtn.classList.add('listening');
      micBtn.textContent = '⏹';
      setStatus('Listening... click mic again to stop', 'loading');
    }
  });

  navigator.mediaDevices.getUserMedia({ audio: true }).catch(() => {});

} else {
  micBtn.disabled = true;
  setStatus('⚠ Voice not supported. Use Chrome.', 'error');
}

// Translate button + Ctrl+Enter
document.getElementById('translateBtn').addEventListener('click', () => {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { setStatus('Please enter text to translate.', 'error'); return; }
  translateText(text, false);
});

document.getElementById('inputText').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    const text = document.getElementById('inputText').value.trim();
    if (text) translateText(text, false);
  }
});

async function translateText(input, isLive) {
  const apiKey = getApiKey();
  if (!apiKey) { setStatus('Please enter your API key.', 'error'); return; }

  if (isLive) {
    document.getElementById('outputBox').classList.add('live-mode');
    setStatus('● Live translating...', 'loading');
  } else {
    setStatus('Translating...', 'loading');
    document.getElementById('translateBtn').disabled = true;
  }

  document.getElementById('outputCard').style.display = 'block';

  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'gpt-4o',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: `${currentMode}: ${input}` }
        ],
        temperature: 0.3,
        max_tokens: 1000
      })
    });

    const data = await res.json();
    if (data.error) { setStatus('Error: ' + data.error.message, 'error'); return; }

    const raw = data.choices[0].message.content.trim();

    if (currentMode === 'M' && raw.includes('---SUMMARY---')) {
      const parts = raw.split('---SUMMARY---');
      document.getElementById('outputText').textContent = parts[0].trim();
      document.getElementById('summaryText').textContent = parts[1].trim();
      document.getElementById('summarySection').style.display = 'block';
    } else {
      document.getElementById('outputText').textContent = raw;
      document.getElementById('summarySection').style.display = 'none';
    }

    document.getElementById('outputBox').classList.remove('live-mode');
    setStatus('');

    if (!isLive) addToHistory(currentMode, input, raw);

  } catch (err) {
    setStatus('Network error: ' + err.message, 'error');
  } finally {
    if (!isLive) document.getElementById('translateBtn').disabled = false;
  }
}

// History
function addToHistory(mode, input, output) {
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  translationHistory.unshift({ mode, input, output, time });
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const empty = document.getElementById('historyEmpty');

  if (translationHistory.length === 0) {
    empty.style.display = 'block';
    Array.from(list.children).forEach(c => { if (c !== empty) c.remove(); });
    return;
  }
  empty.style.display = 'none';
  Array.from(list.children).forEach(c => { if (c !== empty) c.remove(); });

  translationHistory.forEach((item, i) => {
    const outputPreview = item.output.includes('---SUMMARY---')
      ? item.output.split('---SUMMARY---')[0].trim()
      : item.output;

    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `
      <div class="history-meta">
        <span class="history-mode">${item.mode}:</span>
        <span>${item.time}</span>
      </div>
      <div class="history-input">${item.input.length > 80 ? item.input.slice(0,80)+'…' : item.input}</div>
      <div class="history-output">${outputPreview.length > 120 ? outputPreview.slice(0,120)+'…' : outputPreview}</div>
      <button class="history-copy" data-i="${i}">copy</button>
    `;
    list.appendChild(div);
  });

  list.querySelectorAll('.history-copy').forEach(btn => {
    btn.addEventListener('click', () => {
      const item = translationHistory[parseInt(btn.dataset.i)];
      const text = item.output.includes('---SUMMARY---')
        ? item.output.split('---SUMMARY---')[0].trim()
        : item.output;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'copied!';
        setTimeout(() => btn.textContent = 'copy', 1500);
      });
    });
  });
}

document.getElementById('clearHistoryBtn').addEventListener('click', () => {
  translationHistory = [];
  renderHistory();
});

// Clear
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('inputText').value = '';
  document.getElementById('outputCard').style.display = 'none';
  fullTranscript = '';
  setStatus('');
});

// Copy output
document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('outputText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copyBtn').textContent = 'copied!';
    setTimeout(() => document.getElementById('copyBtn').textContent = 'copy', 1500);
  });
});

function setStatus(msg, type = '') {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status' + (type ? ' ' + type : '');
}

updatePlaceholder();
</script>
</body>
</html>
