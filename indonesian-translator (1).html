<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Indonesian Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #141714;
    --card: #1a1e1a;
    --border: #2a2e2a;
    --accent: #7ecb8f;
    --accent2: #4a9e5c;
    --text: #e8ede8;
    --muted: #7a8a7a;
    --error: #e07070;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    background-image: 
      radial-gradient(ellipse at 20% 20%, rgba(126,203,143,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(74,158,92,0.04) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  header p {
    color: var(--muted);
    font-size: 0.78rem;
    margin-top: 6px;
    letter-spacing: 0.08em;
  }

  .container {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .label {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* API Key */
  .api-row {
    display: flex;
    gap: 10px;
  }

  input[type="password"], input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus {
    border-color: var(--accent2);
  }

  /* Mode selector */
  .modes {
    display: flex;
    gap: 8px;
  }

  .mode-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    padding: 10px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .mode-btn:hover { border-color: var(--accent2); color: var(--text); }
  .mode-btn.active {
    background: rgba(126,203,143,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Prompt box */
  .prompt-area {
    position: relative;
  }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 14px;
    resize: vertical;
    min-height: 110px;
    outline: none;
    line-height: 1.6;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent2); }
  textarea::placeholder { color: var(--muted); }

  /* Controls row */
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 10px 18px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn:hover { border-color: var(--accent2); color: var(--accent); }

  .btn-mic {
    background: var(--surface);
    border-color: var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 1.1rem;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid var(--border);
  }

  .btn-mic:hover { border-color: var(--accent2); }

  .btn-mic.listening {
    border-color: var(--accent);
    color: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(126,203,143,0.3); }
    50% { box-shadow: 0 0 0 6px rgba(126,203,143,0); }
  }

  .btn-translate {
    flex: 1;
    background: rgba(126,203,143,0.1);
    border-color: var(--accent2);
    color: var(--accent);
    font-size: 0.82rem;
    letter-spacing: 0.06em;
  }

  .btn-translate:hover {
    background: rgba(126,203,143,0.18);
    border-color: var(--accent);
  }

  .btn-translate:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Output */
  .output-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 0.87rem;
    line-height: 1.7;
    min-height: 80px;
    white-space: pre-wrap;
    color: var(--text);
    position: relative;
  }

  .output-box.empty { color: var(--muted); font-style: italic; }

  .output-box .copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .output-box .copy-btn:hover { color: var(--accent); border-color: var(--accent2); }

  .summary-box {
    background: rgba(126,203,143,0.04);
    border: 1px solid rgba(126,203,143,0.15);
    border-radius: 8px;
    padding: 14px;
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .summary-label {
    font-size: 0.66rem;
    color: var(--accent2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .status {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.05em;
  }

  .status.error { color: var(--error); }
  .status.loading { color: var(--accent2); }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--border);
    margin: 4px auto;
  }

  #mic-lang-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 10px 10px;
    outline: none;
    cursor: pointer;
  }

  #mic-lang-select:focus { border-color: var(--accent2); }

  option { background: var(--bg); }
</style>
</head>
<body>

<header>
  <h1>Indonesian Translator</h1>
  <p>voice · text · T: · M: · C:</p>
</header>

<div class="container">

  <!-- API Key hidden -->

  <!-- Mode -->
  <div class="card">
    <div class="label">Translation Mode</div>
    <div class="modes">
      <button class="mode-btn active" data-mode="T">T: → English</button>
      <button class="mode-btn" data-mode="M">M: → Indonesian</button>
      <button class="mode-btn" data-mode="C">C: Check</button>
    </div>
  </div>

  <!-- Input -->
  <div class="card">
    <div class="label">Input</div>
    <div class="prompt-area">
      <textarea id="inputText" placeholder="Type or use the mic to speak..."></textarea>
    </div>
    <div class="controls" style="margin-top:10px;">
      <select id="mic-lang-select" title="Mic language">
        <option value="id-ID">🎙 Indonesian</option>
        <option value="en-US">🎙 English</option>
      </select>
      <button class="btn-mic" id="micBtn" title="Hold to speak">🎤</button>
      <button class="btn btn-translate" id="translateBtn">Translate</button>
      <button class="btn" id="clearBtn">Clear</button>
    </div>
  </div>

  <!-- Status -->
  <div class="status" id="status"></div>

  <!-- Output -->
  <div class="card" id="outputCard" style="display:none;">
    <div class="label">Translation</div>
    <div class="output-box" id="outputBox">
      <button class="copy-btn" id="copyBtn">copy</button>
      <span id="outputText"></span>
    </div>

    <!-- Summary only for M: mode -->
    <div id="summarySection" style="display:none; margin-top:12px;">
      <div class="summary-box">
        <div class="summary-label">English Summary</div>
        <span id="summaryText"></span>
      </div>
    </div>
  </div>

</div>

<script>
const SYSTEM_PROMPT = `You are an expert Indonesian translator with deep knowledge of Bahasa Indonesia, Sundanese (Basa Sunda), and Arabic linguistic nuances.

TRANSLATION MODES:

T: [text] → Translate Indonesian to English. Output ONLY the English translation. No labels, no commentary, no status words, nothing else.

M: [text] → Translate English to Indonesian. Output the Indonesian translation, then on a new line write "---SUMMARY---" followed by a brief English summary of the translated content to confirm accuracy. Nothing else.

C: [text] → Check and verify an Indonesian translation. Explain in English what is correct or incorrect, then provide the corrected version. Keep it concise.

QUALITY ASSURANCE (silent):
Before presenting output, internally verify for grammar accuracy, naturalness, cultural appropriateness, and tone. Never show verification labels, "Verified", status markers, or closing remarks.

PRINCIPLES:
- Natural, fluent language over literal translation
- Default to formal register unless context suggests informal
- Preserve idioms, tone, and cultural intent
- For Sundanese: note regional variations only when directly relevant
- For Arabic terms: use proper Indonesian equivalents with cultural sensitivity`;

let currentMode = 'T';
let recognition = null;
let isListening = false;

// Mode buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    updatePlaceholder();
  });
});

function updatePlaceholder() {
  const ta = document.getElementById('inputText');
  if (currentMode === 'T') ta.placeholder = 'Type or speak Indonesian text to translate to English...';
  else if (currentMode === 'M') ta.placeholder = 'Type or speak English text to convert to Indonesian...';
  else ta.placeholder = 'Paste Indonesian text to check and verify...';
}

// Mic
const micBtn = document.getElementById('micBtn');
const micLang = document.getElementById('mic-lang-select');

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onresult = (e) => {
    let transcript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    document.getElementById('inputText').value = transcript;
  };

  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
    setStatus('');
  };

  recognition.onerror = (e) => {
    isListening = false;
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
    setStatus('Mic error: ' + e.error, 'error');
  };

  micBtn.addEventListener('click', () => {
    if (isListening) {
      recognition.stop();
    } else {
      recognition.lang = micLang.value;
      recognition.start();
      isListening = true;
      micBtn.classList.add('listening');
      micBtn.textContent = '⏹';
      setStatus('Listening...', 'loading');
    }
  });
} else {
  micBtn.disabled = true;
  micBtn.title = 'Speech recognition not supported in this browser. Use Chrome.';
  setStatus('⚠ Voice not supported. Use Chrome for mic input.', 'error');
}

// Translate
document.getElementById('translateBtn').addEventListener('click', translate);
document.getElementById('inputText').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) translate();
});

async function translate() {
  const apiKey = getApiKey();
  const input = document.getElementById('inputText').value.trim();

  if (!apiKey) { setStatus('API key not configured.', 'error'); return; }
  if (!input) { setStatus('Please enter text to translate.', 'error'); return; }

  const userMessage = `${currentMode}: ${input}`;

  setStatus('Translating...', 'loading');
  document.getElementById('translateBtn').disabled = true;
  document.getElementById('outputCard').style.display = 'none';

  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'gpt-4o',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: userMessage }
        ],
        temperature: 0.3,
        max_tokens: 1000
      })
    });

    const data = await res.json();

    if (data.error) {
      setStatus('Error: ' + data.error.message, 'error');
      return;
    }

    const raw = data.choices[0].message.content.trim();

    document.getElementById('outputCard').style.display = 'block';

    if (currentMode === 'M' && raw.includes('---SUMMARY---')) {
      const parts = raw.split('---SUMMARY---');
      document.getElementById('outputText').textContent = parts[0].trim();
      document.getElementById('summaryText').textContent = parts[1].trim();
      document.getElementById('summarySection').style.display = 'block';
    } else {
      document.getElementById('outputText').textContent = raw;
      document.getElementById('summarySection').style.display = 'none';
    }

    setStatus('');
  } catch (err) {
    setStatus('Network error: ' + err.message, 'error');
  } finally {
    document.getElementById('translateBtn').disabled = false;
  }
}

// Clear
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('inputText').value = '';
  document.getElementById('outputCard').style.display = 'none';
  setStatus('');
});

// Copy
document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('outputText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copyBtn').textContent = 'copied!';
    setTimeout(() => document.getElementById('copyBtn').textContent = 'copy', 1500);
  });
});

function setStatus(msg, type = '') {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status' + (type ? ' ' + type : '');
}

updatePlaceholder();

const SESSION_KEY = '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';

function getApiKey() {
  return SESSION_KEY;
}

// Request mic permission proactively so Chrome enables it
if (recognition) {
  navigator.mediaDevices.getUserMedia({ audio: true }).catch(() => {});
}
</script>
</body>
</html>
